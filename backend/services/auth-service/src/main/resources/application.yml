server:
  port: ${APP_PORT:8086}

spring:
  application:
    name: auth-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/auth_db}
    username: ${DB_USERNAME:healthcare}
    password: ${DB_PASSWORD:healthcare}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
  rabbitmq:
    addresses: ${RABBITMQ_URL:amqp://healthcare:healthcare@localhost:5673}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  pattern:
    level: "%5p [traceId:%X{traceId:-},userId:%X{userId:-},role:%X{role:-}]"

app:
  service:
    name: auth-service
    description: JWT issuing and identity foundation.
    database: auth_db
    rabbitmq-enabled: false
    redis-enabled: false

security:
  jwt:
    secret: ${JWT_SECRET:change-this-before-shared-environments}
    access-token-expires-in-seconds: ${JWT_ACCESS_TOKEN_EXPIRES_IN_SECONDS:900}
    refresh-token-expires-in-seconds: ${JWT_REFRESH_TOKEN_EXPIRES_IN_SECONDS:604800}
