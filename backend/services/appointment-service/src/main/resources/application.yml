server:
  port: ${APP_PORT:8084}

spring:
  application:
    name: appointment-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/appointment_db}
    username: ${DB_USERNAME:healthcare}
    password: ${DB_PASSWORD:healthcare}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
  rabbitmq:
    addresses: ${RABBITMQ_URL:amqp://healthcare:healthcare@localhost:5673}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  service:
    name: appointment-service
    description: Booking workflow, locking, and event publishing foundation.
    database: appointment_db
    rabbitmq-enabled: true
    redis-enabled: true
  internal:
    service-token: ${INTERNAL_SERVICE_TOKEN:change-this-before-shared-environments}
  clients:
    doctor-service:
      base-url: ${DOCTOR_SERVICE_URL:http://localhost:8083}
      timeout-ms: ${DOCTOR_SERVICE_TIMEOUT_MS:2000}
      service-token: ${INTERNAL_SERVICE_TOKEN:change-this-before-shared-environments}

security:
  jwt:
    secret: ${JWT_SECRET:change-this-before-shared-environments}
