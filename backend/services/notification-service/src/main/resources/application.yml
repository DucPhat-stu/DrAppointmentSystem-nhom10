server:
  port: ${APP_PORT:8085}

spring:
  application:
    name: notification-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/notification_db}
    username: ${DB_USERNAME:healthcare}
    password: ${DB_PASSWORD:healthcare}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
  rabbitmq:
    addresses: ${RABBITMQ_URL:amqp://healthcare:healthcare@localhost:5673}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  pattern:
    level: "%5p [traceId:%X{traceId:-},userId:%X{userId:-},role:%X{role:-}]"

app:
  service:
    name: notification-service
    description: Appointment event consumer and patient notifications foundation.
    database: notification_db
    rabbitmq-enabled: true
    redis-enabled: false

security:
  jwt:
    secret: ${JWT_SECRET:change-this-before-shared-environments}
