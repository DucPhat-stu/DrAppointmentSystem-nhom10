server:
  port: ${APP_PORT:8083}

spring:
  application:
    name: doctor-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/doctor_db}
    username: ${DB_USERNAME:healthcare}
    password: ${DB_PASSWORD:healthcare}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:500ms}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
  rabbitmq:
    addresses: ${RABBITMQ_URL:amqp://healthcare:healthcare@localhost:5673}

springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:true}
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  pattern:
    level: "%5p [traceId:%X{traceId:-},userId:%X{userId:-},role:%X{role:-}]"

app:
  service:
    name: doctor-service
    description: Doctor availability and timeslot foundation.
    database: doctor_db
    rabbitmq-enabled: false
    redis-enabled: true
  internal:
    service-token: ${INTERNAL_SERVICE_TOKEN:change-this-before-shared-environments}
  clients:
    appointment-service:
      base-url: ${APPOINTMENT_SERVICE_URL:http://localhost:8084}
      timeout-ms: ${APPOINTMENT_SERVICE_TIMEOUT_MS:2000}
      service-token: ${INTERNAL_SERVICE_TOKEN:change-this-before-shared-environments}
    user-service:
      base-url: ${USER_SERVICE_URL:http://localhost:8081}
      timeout-ms: ${USER_SERVICE_TIMEOUT_MS:2000}
      service-token: ${INTERNAL_SERVICE_TOKEN:change-this-before-shared-environments}
  available-slots:
    cache:
      enabled: ${AVAILABLE_SLOTS_CACHE_ENABLED:true}
      ttl-seconds: ${AVAILABLE_SLOTS_CACHE_TTL_SECONDS:300}

security:
  jwt:
    secret: ${JWT_SECRET:change-this-before-shared-environments}
